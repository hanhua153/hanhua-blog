baseURL: "https://hanhua.asia"
languageCode: "zh-cn"
title: "寒花的技术站"
theme: "PaperMod"

permalinks:
  posts: /posts/:filename/

outputs:
  home:
    - HTML
    - RSS
  page:
    - HTML

params:
  env: production
  title: "寒花的技术站"
  description: "技术笔记与个人博客"
  author: "寒花"
  keywords: ["blog", "技术", "笔记"]
  images: ["https://hanhua.asia/og-image.png"]
  
  homeInfoParams:
    Title: "你好，欢迎来访"
    Content: "这里记录技术学习和日常思考"

  socialIcons:
    - name: github
      url: "https://github.com/hanhua153"

  defaultTheme: auto
  disableThemeToggle: false
  showBreadcrumbs: false
  showReadingTime: true
  showLastMod: true
  showtoc: false
  toc: true

  profileMode:
    enabled: true
    title: "寒花"
    subtitle: "技术学习者"
    imageUrl: "https://hanhua.asia/images/profile.png"
    imageWidth: 120
    imageHeight: 120
    buttons:
      - name: 博客
        url: posts/
      - name: 关于
        url: about/

  home:
    postsBy: date
    showLabels: false
    showHidden: false
    hideReadMore: false
    hideElseContent: false
    paginate: 7

markup:
  highlight:
    noClasses: false
    lineNos: true
  tableOfContents:
    endLevel: 3
    ordered: true
    startLevel: 2

security:
  enableInlineShortcodes: true

sitemap:
  changefreq: weekly
  filename: sitemap.xml
  priority: 0.7
