baseURL: "https://hanhua.asia/"
languageCode: "zh-cn"
title: "知识积累"
theme: "PaperMod"

permalinks:
  posts: /posts/:filename/

outputs:
  home:
    - HTML
    - RSS
  page:
    - HTML

params:
  env: production
  title: "知识积累"
  description: "技术笔记与个人博客"
  author: "寒花"
  keywords: ["blog", "技术", "笔记"]

  defaultTheme: auto
  disableThemeToggle: false
  showBreadcrumbs: false
  showReadingTime: true
  showLastMod: true
  showtoc: false
  toc: true

  profileMode:
    enabled: true
    title: "寒花"
    subtitle: "技术学习者"
    imageWidth: 120
    imageHeight: 120
    buttons:
      - name: 博客
        url: posts/
      - name: 关于
        url: about/

  home:
    postsBy: date
    showLabels: false
    showHidden: false
    hideReadMore: false
    hideElseContent: false
    paginate: 7

  footer:
    custom: '<a href="https://beian.miit.gov.cn/" target="_blank">闽ICP备2026016259号-1</a>'

markup:
  highlight:
    noClasses: false
    lineNos: true

security:
  enableInlineShortcodes: true

sitemap:
  changefreq: weekly
  filename: sitemap.xml
  priority: 0.7
